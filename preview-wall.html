<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>壁プレビュー</title>
<style>
  body { margin: 0; background: #0a1018; display: flex; flex-direction: column; align-items: center; padding: 1rem; font-family: system-ui, sans-serif; color: #ccd8e4; }
  h2   { margin: 0 0 0.5rem; font-size: 1rem; color: #6080a0; }
  .row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  .panel { text-align: center; }
  canvas { display: block; border-radius: 8px; border: 1px solid #2c4055; }
  p { font-size: 0.8rem; color: #6080a0; margin: 0.4rem 0 1rem; }
</style>
</head>
<body>
<h2>3D ビュー 壁変更 プレビュー</h2>
<p>左: 変更前（空＋地面グラデ） ／ 右: 変更後（ダーク背景＋道路サイド壁）</p>
<div class="row">
  <div class="panel"><canvas id="before" width="360" height="220"></canvas><p>変更前</p></div>
  <div class="panel"><canvas id="after"  width="360" height="220"></canvas><p>変更後</p></div>
</div>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three'

// ── shared constants ───────────────────────────────
const ROAD_HALF_W = 4.0
const SHOULDER_W  = 2.0
const Y_EXAG      = 2.5
const DARK        = 0.65
const WALL_DEPTH  = 10

const ROAD_EASY    = new THREE.Color('#2ed573').multiplyScalar(DARK)
const ROAD_MOD     = new THREE.Color('#ffd32a').multiplyScalar(DARK)
const ROAD_HARD    = new THREE.Color('#ff6348').multiplyScalar(DARK)
const SHOULDER_COL = new THREE.Color(0x282828)

function roadColor(g) {
  if (g < 3) return ROAD_EASY
  if (g < 6) return ROAD_MOD
  return ROAD_HARD
}

// Straight road with varied gradient
function makePts() {
  const pts = []
  for (let i = 0; i <= 60; i++) {
    const d   = i * 5
    const g   = 2 + 5 * Math.sin(i * 0.18)
    const elv = i * 0.3 + Math.sin(i * 0.18) * 2
    pts.push({ x: 0, y: elv * Y_EXAG, z: -d, distM: d, grad: g })
  }
  return pts
}

function buildRibbon(pts) {
  const n = pts.length, V = 4
  const pos = new Float32Array(n * V * 3)
  const col = new Float32Array(n * V * 3)
  for (let i = 0; i < n; i++) {
    const pt = pts[i]
    const w = ROAD_HALF_W, s = ROAD_HALF_W + SHOULDER_W
    const setP = (v, ox) => { const b=(i*V+v)*3; pos[b]=pt.x+ox; pos[b+1]=pt.y; pos[b+2]=pt.z }
    setP(0, -s); setP(1, -w); setP(2, w); setP(3, s)
    const rc = roadColor(pt.grad)
    for (let v = 0; v < V; v++) {
      const b=(i*V+v)*3
      const c = (v===0||v===3) ? SHOULDER_COL : rc
      col[b]=c.r; col[b+1]=c.g; col[b+2]=c.b
    }
  }
  const idx = new Uint32Array((n-1)*3*6); let k=0
  for (let i=0;i<n-1;i++) {
    const a=i*V,b=(i+1)*V
    for (let q=0;q<3;q++){idx[k++]=a+q;idx[k++]=b+q;idx[k++]=a+q+1;idx[k++]=a+q+1;idx[k++]=b+q;idx[k++]=b+q+1}
  }
  const geo = new THREE.BufferGeometry()
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3))
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3))
  geo.setIndex(new THREE.BufferAttribute(idx, 1))
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.DoubleSide }))
}

function buildWalls(pts) {
  const n = pts.length, segs = n - 1
  const pos = new Float32Array(segs * 2 * 4 * 3)
  const col = new Float32Array(segs * 2 * 4 * 3)
  const idx = new Uint32Array(segs * 2 * 6)
  let vi = 0, ki = 0
  for (let side = 0; side < 2; side++) {
    const sign = side === 0 ? -1 : 1
    for (let i = 0; i < segs; i++) {
      const pt = pts[i], nx = pts[i+1]
      const ox = sign * ROAD_HALF_W
      const fade = Math.max(0, 1 - pts[i].distM / 200)
      const rc   = roadColor(pt.grad)
      const setV = (v, x, y, z, f) => {
        const b = (vi+v)*3; pos[b]=x; pos[b+1]=y; pos[b+2]=z
        const cb=(vi+v)*3; col[cb]=rc.r*f; col[cb+1]=rc.g*f; col[cb+2]=rc.b*f
      }
      setV(0, pt.x+ox,  pt.y,               pt.z,  fade)   // top-near
      setV(1, nx.x+ox,  nx.y,               nx.z,  fade)   // top-far
      setV(2, nx.x+ox,  nx.y - WALL_DEPTH,  nx.z,  0)      // bottom-far  (black)
      setV(3, pt.x+ox,  pt.y - WALL_DEPTH,  pt.z,  0)      // bottom-near (black)
      idx[ki++]=vi; idx[ki++]=vi+1; idx[ki++]=vi+2
      idx[ki++]=vi; idx[ki++]=vi+2; idx[ki++]=vi+3
      vi += 4
    }
  }
  const geo = new THREE.BufferGeometry()
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3))
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3))
  geo.setIndex(new THREE.BufferAttribute(idx, 1))
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.DoubleSide }))
}

// ── camera setup (shared) ──────────────────────────
function makeCamera(canvas) {
  const cam = new THREE.PerspectiveCamera(65, canvas.width/canvas.height, 0.5, 800)
  const eyeY = pts[0].y + Y_EXAG * 1.8
  cam.position.set(0, eyeY, 2)
  cam.lookAt(0, eyeY + 0.75, -6)
  return cam
}

const pts = makePts()

// ── BEFORE ────────────────────────────────────────
;(function() {
  const canvas   = document.getElementById('before')
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true })
  renderer.setPixelRatio(devicePixelRatio)
  renderer.setClearColor(0x4a7ab5, 1)

  const scene = new THREE.Scene()
  scene.fog   = new THREE.Fog(0x4a7ab5, 20, 220)

  const bg = new THREE.Mesh(
    new THREE.PlaneGeometry(400, 200),
    new THREE.MeshBasicMaterial({ color: 0x7a5020, side: THREE.DoubleSide })
  )
  bg.rotation.x = -Math.PI / 2
  bg.position.y = pts[0].y - 0.1
  scene.add(bg)

  scene.add(buildRibbon(pts))

  const cam = makeCamera(canvas)
  renderer.render(scene, cam)
})()

// ── AFTER ─────────────────────────────────────────
;(function() {
  const canvas   = document.getElementById('after')
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true })
  renderer.setPixelRatio(devicePixelRatio)
  renderer.setClearColor(0x0a1018, 1)

  const scene = new THREE.Scene()
  scene.fog   = new THREE.Fog(0x0a1018, 20, 220)

  scene.add(buildRibbon(pts))
  scene.add(buildWalls(pts))

  const cam = makeCamera(canvas)
  renderer.render(scene, cam)
})()
</script>
</body>
</html>
